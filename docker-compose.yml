version: '3.8'

# Template konfigurasi dasar untuk Airflow
x-airflow-common:
  &airflow-common
  build: . # Menggunakan Dockerfile custom di atas
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:admin123@postgres/airflow_db
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scraper:/opt/airflow/scraper # Mount folder scraper agar bisa dibaca Airflow
    - ./logs:/opt/airflow/logs
  depends_on:
    - postgres

services:
  # 1. Database (PostgreSQL)
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=airflow_db
      # Nanti di dalam Postgres ini, kamu bisa bikin skema/database baru khusus untuk nyimpen data hasil scrape
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. Inisialisasi Database Airflow (Hanya jalan sekali saat awal)
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin

  # 3. Airflow UI (Dashboard Web)
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  # 4. Airflow Scheduler (Mesin pengeksekusi script Python-mu)
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  # 5. Metabase (Dashboard Visualisasi)
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=airflow_db
      - MB_DB_PORT=5432
      - MB_DB_USER=admin
      - MB_DB_PASS=admin123
      - MB_DB_HOST=postgres
    depends_on:
      - postgres

volumes:
  postgres-data: